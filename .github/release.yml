# Release 更新日志自动归纳配置（基于 PR 分类）
# 由于日常直接推 main（非 PR），多数提交会进入"其他变更"，
# 完整的版本间提交关联见 Release 底部的 Full Changelog 链接

changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: "🚀 新功能"
      labels:
        - feature
        - feat
        - enhancement
    - title: "🐛 问题修复"
      labels:
        - fix
        - bugfix
        - bug
    - title: "📝 文档"
      labels:
        - docs
        - documentation
    - title: "其他变更"
      labels:
        - "*"
