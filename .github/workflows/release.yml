name: Release

# 推送 v* tag 时自动创建 GitHub Release
# 工具的「检查框架更新」通过 releases/latest 读取最新版本

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # 拉取完整历史，用于生成版本间更新记录

      - name: Generate release notes from git log
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $prev = git tag --sort=-creatordate | Where-Object { $_ -ne $tag } | Select-Object -First 1
          if ($prev) {
            "## What's Changed`n" | Out-File release_notes.md -Encoding utf8
            git log "$prev..$tag" --pretty=format:"- %s (%h)" | Out-File release_notes.md -Append -Encoding utf8
            "`n`n**Full Changelog**: https://github.com/${{ github.repository }}/compare/$prev...$tag" | Out-File release_notes.md -Append -Encoding utf8
          } else {
            "## What's Changed`n" | Out-File release_notes.md -Encoding utf8
            git log "$tag" --pretty=format:"- %s (%h)" | Out-File release_notes.md -Append -Encoding utf8
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: bgd_sce_framework ${{ github.ref_name }}
          body_path: release_notes.md
